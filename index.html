<style>
  :root {
    --bg: #0e0e0e;
    --surface: #171717;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --heart: #e74c3c;
    --heart-glow: #ff6b6b;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
  }

  body {
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* hide the whole app while locked, gate stays visible */
  body.locked > *:not(#gate) { display: none !important; }

  /* ===== PASSWORD GATE ===== */
  #gate {
    position: fixed;
    inset: 0;
    background: #ffffff;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
  }

  #gate.hidden { display: none; }

  #gate-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #gate-input {
    width: 260px;
    text-align: center;
    font-size: 17px;
    letter-spacing: 3px;
    padding: 15px 18px;
    border: 1px solid #e2e2e2;
    border-radius: 10px;
    outline: none;
    color: #222;
    background: #fbfbfb;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s;
  }

  #gate-input::placeholder {
    color: #bbb;
    letter-spacing: 1px;
  }

  #gate-input:focus {
    border-color: #ccc;
    background: #ffffff;
  }

  #gate-input.shake {
    animation: gate-shake 0.35s ease;
    border-color: #e08080;
  }

  @keyframes gate-shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }

  .gate-error {
    font-size: 12px;
    color: #c0392b;
    height: 14px;
    opacity: 0;
    transition: opacity 0.2s;
    letter-spacing: 0.3px;
  }

  .gate-error.show { opacity: 1; }

  /* ===== EXISTING SITE STYLES ===== */

  header {
    width: 100%;
    max-width: 900px;
    padding: 60px 24px 24px;
    text-align: center;
  }

  header h1 {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--text);
  }

  .search-wrap {
    width: 100%;
    max-width: 900px;
    padding: 0 24px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(var(--bg) 85%, transparent);
    padding-top: 16px;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: #444; }

  .results-info {
    max-width: 900px;
    width: 100%;
    padding: 0 24px 16px;
    color: var(--muted);
    font-size: 13px;
  }

  .grid {
    width: 100%;
    max-width: 900px;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .grid.single-result { grid-template-columns: 1fr; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
  }

  .card:hover { border-color: #444; transform: translateY(-2px); }

  .card.spotlight {
    animation: spotlight-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    grid-column: 1 / -1;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  @keyframes spotlight-in {
    from { opacity: 0.4; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1); }

  .thumb {
    aspect-ratio: 16/9;
    background: #111;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;

  .thumb-label {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #2a2a2a;
    user-select: none;

  .card-body { padding: 14px 16px; }

    text-align: center;

const GATE_HASHES = new Set([
  "1b879216dc17755c07c11fd2b7e15dd8df5ef7f8c0a3f27e1c6f0ddb4d2c03b6", // 0907
  "46ddd8196f72b3e629511ce5c746aaaa82d53df3f9a3e8831d653bbb04ccf13e", // 2802

]);

async function sha256Hex(str) {
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function tryUnlock(value) {
  if (!value) return false;
  const hash = await sha256Hex(value);
  return GATE_HASHES.has(hash);
}

function unlockSite() {

  input.classList.add("shake");
  input.value = "";
  setTimeout(() => input.classList.remove("shake"), 350);
}

document.getElementById("gate-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const ok = await tryUnlock(input.value);
  if (ok) {
    unlockSite();
  } else {
    showGateError();
  }
});

async function sbFetch(path, opts = {}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,

// hearts cache: { videoId: count }
let heartCache = {};

async function loadAllHearts() {
  try {
    const r = await sbFetch('hearts?select=video_id,count');
    if (r.ok) {
      const data = await r.json();
      heartCache = {};
      for (const row of data) heartCache[row.video_id] = row.count;
    }
  } catch(e) {}
}

async function getHeartCount(videoId) {
  try {
    const r = await sbFetch(`hearts?video_id=eq.${videoId}&select=count`);
    if (r.ok) {
      const data = await r.json();
      if (data.length) { heartCache[videoId] = data[0].count; return data[0].count; }
    }
  } catch(e) {}
  return heartCache[videoId] || 0;
}

async function incrementHeart(videoId) {
  try {
    // upsert: if row exists increment, else insert with count=1
    const r = await sbFetch('hearts', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({ video_id: videoId, count: 1 }),
    });
    if (r.ok) {
      const data = await r.json();
      const newCount = Array.isArray(data) ? data[0]?.count : data?.count;
      if (newCount !== undefined) { heartCache[videoId] = newCount; return newCount; }
    }
  } catch(e) {}
  // fallback local
  heartCache[videoId] = (heartCache[videoId] || 0) + 1;
  return heartCache[videoId];
}

let currentVideo = null;
let comboCount = 0;
let comboTimer = null;

const COMBO_TIERS = [
  { min: 50, label: '👑 LEGENDARY', cls: 'legendary' },
  { min: 20, label: '🔥 ON FIRE',   cls: 'on-fire' },
  { min: 10, label: '⚡ COMBO x',   cls: 'active', showCount: true },
  { min: 5,  label: '× ',           cls: 'active', showCount: true },
  { min: 2,  label: '× ',           cls: 'active', showCount: true },
];

function getTier(combo) {
  for (const t of COMBO_TIERS) {
    if (combo >= t.min) return t;
  }
  return null;
}

function spawnFloaty(btn, combo) {
  const section = document.querySelector('.heart-section');
  const el = document.createElement('div');
  el.className = 'floaty';

  const tier = getTier(combo);
  if (tier && combo >= 50) el.textContent = '♥♥♥';
  else if (tier && combo >= 20) el.textContent = '♥♥';
  else el.textContent = '+1';

  el.style.left = (btn.offsetLeft + btn.offsetWidth / 2 - 15 + (Math.random() * 30 - 15)) + 'px';
  el.style.top  = (btn.offsetTop - 10) + 'px';
  section.style.position = 'relative';
  section.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function updateHeartUI(count, combo) {
  const btn = document.getElementById('heart-big-btn');
  const display = document.getElementById('heart-count-display');
  const label = document.getElementById('combo-label');

  // count
  display.textContent = count === 1 ? '1 herz' : `${count} herzen`;
  display.className = 'heart-count-display' + (count > 0 ? (count >= 50 ? ' legendary' : count >= 20 ? ' on-fire' : ' has-hearts') : '');

  // btn state
  btn.className = 'heart-big-btn' + (count >= 50 ? ' legendary' : count >= 20 ? ' on-fire' : '');

  // combo label
  const tier = getTier(combo);
  if (tier && combo >= 2) {
    label.className = 'combo-label ' + tier.cls;
    label.textContent = tier.showCount ? tier.label + combo : tier.label;
  } else {
    label.className = 'combo-label';
    label.textContent = '';
  }

  // pump animation
  btn.classList.remove('pumping');
  void btn.offsetWidth;
  btn.classList.add('pumping');
  setTimeout(() => btn.classList.remove('pumping'), 300);
}

async function clickHeart() {
  if (!currentVideo) return;

  comboCount++;
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { comboCount = 0; }, 1500);

  const newCount = await incrementHeart(currentVideo.id);
  spawnFloaty(document.getElementById('heart-big-btn'), comboCount);
  updateHeartUI(newCount, comboCount);

  // refresh card
  renderCards(document.getElementById('search').value);
}

function matchesToken(v, token) {
  const t = token.toLowerCase();
  if (!t) return true;
  const numMatch = t.match(/^(?:heute\s*)?(\d+)$/);
  if (numMatch && parseInt(numMatch[1]) === v.id) return true;
  if (t === 'heute') return true;
  for (let i = 0; i < v.persons.length; i++) {
    if (v.persons[i].toLowerCase().includes(t)) return true;
    if (v.realNames[i].toLowerCase().includes(t)) return true;
  }
  for (const g of v.games) {
    if (g.toLowerCase().includes(t)) return true;
  }
  return false;
}

function matches(v, q) {
  const tokens = q.trim().split(/\s+/).filter(Boolean);
  if (!tokens.length) return true;
  return tokens.every(tok => matchesToken(v, tok));
}

function buildTitle(v) { return v.games.join(', '); }

function renderCards(q) {
  const filtered = VIDEOS.filter(v => matches(v, q));
  const grid = document.getElementById('grid');
  const info = document.getElementById('results-info');
  grid.innerHTML = '';

  const single = filtered.length === 1;
  grid.className = 'grid' + (single ? ' single-result' : '');

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">nichts gefunden.</div>';
    info.textContent = '';
    return;
  }

  info.textContent = q.trim()
    ? (filtered.length === VIDEOS.length ? `alle ${VIDEOS.length} videos` : `${filtered.length} von ${VIDEOS.length} videos`)
    : `${VIDEOS.length} videos`;

  for (const v of filtered) {
    const card = document.createElement('div');
    card.className = 'card' + (single ? ' spotlight' : '');
    card.onclick = () => openModal(v);
    const hc = heartCache[v.id] || 0;
    card.innerHTML = `
      <div class="thumb">
        <span class="thumb-label">heute ${v.id}</span>
        <div class="play-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-num">heute ${v.id}${hc > 0 ? ` &nbsp;♥ ${hc}` : ''}</div>
        <div class="card-title">${buildTitle(v)}</div>
        <div class="tags">
          ${v.persons.map((p,i) => `<span class="tag person" title="${v.realNames[i]}">${p}</span>`).join('')}
          ${v.games.map(g => `<span class="tag game">${g}</span>`).join('')}
        </div>
      </div>`;
    grid.appendChild(card);
  }
}

async function openModal(v) {
  currentVideo = v;
  comboCount = 0;
  clearTimeout(comboTimer);

  document.getElementById('modal-num').textContent = `HEUTE ${v.id}`;
  document.getElementById('modal-title').textContent = buildTitle(v);
  document.getElementById('modal-tags').innerHTML =
    v.persons.map((p,i) => `<span class="tag person">${p} (${v.realNames[i]})</span>`).join('') +
    v.games.map(g => `<span class="tag game">${g}</span>`).join('');

  document.getElementById('combo-label').textContent = '';
  document.getElementById('combo-label').className = 'combo-label';

  // load count from supabase
  const count = await getHeartCount(v.id);
  const display = document.getElementById('heart-count-display');
  display.textContent = count === 1 ? '1 herz' : `${count} herzen`;
  display.className = 'heart-count-display' + (count > 0 ? ' has-hearts' : '');

  const iframe = document.getElementById('player-iframe');
  iframe.src = `https://www.youtube-nocookie.com/embed/${v.videoId}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('player-iframe').src = '';
  currentVideo = null;
  comboCount = 0;
  clearTimeout(comboTimer);
  renderCards(document.getElementById('search').value);
}

document.addEventListener('keydown', (e) => {
  const isOpen = document.getElementById('modal').classList.contains('open');
  if (e.key === 'Escape' && isOpen) { closeModal(); return; }
  if (!isOpen || document.activeElement.tagName === 'INPUT') return;
  const iframe = document.getElementById('player-iframe');
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (!window._ytPaused) {
      iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
      window._ytPaused = true;
    } else {
      iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
      window._ytPaused = false;
    }
  }
  if (e.key === 'f' || e.key === 'F') {
    const pw = document.querySelector('.player-wrap');
    if (document.fullscreenElement) document.exitFullscreen();
    else pw.requestFullscreen().catch(() => {});
  }
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.getElementById('search').addEventListener('input', (e) => renderCards(e.target.value));

// init — only runs once the gate is unlocked
let _appStarted = false;
async function startApp() {
  if (_appStarted) return;
  _appStarted = true;
  await loadAllHearts();
  renderCards('');
}
</script>
