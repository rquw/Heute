<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heute.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #171717;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
  }

  body {
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body.locked > *:not(#gate) { display: none !important; }

  #gate {
    position: fixed;
    inset: 0;
    background: #ffffff;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
  }

  #gate.hidden { display: none; }

  #gate-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #gate-input {
    width: 260px;
    text-align: center;
    font-size: 17px;
    letter-spacing: 3px;
    padding: 15px 18px;
    border: 1px solid #e2e2e2;
    border-radius: 10px;
    outline: none;
    color: #222;
    background: #fbfbfb;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s;
  }

  #gate-input::placeholder {
    color: #bbb;
    letter-spacing: 1px;
  }

  #gate-input:focus {
    border-color: #ccc;
    background: #ffffff;
  }

  #gate-input.shake {
    animation: gate-shake 0.35s ease;
    border-color: #e08080;
  }

  @keyframes gate-shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }

  .gate-error {
    font-size: 12px;
    color: #c0392b;
    height: 14px;
    opacity: 0;
    transition: opacity 0.2s;
    letter-spacing: 0.3px;
  }

  .gate-error.show { opacity: 1; }

  header {
    width: 100%;
    max-width: 900px;
    padding: 60px 24px 24px;
    text-align: center;
  }

  header h1 {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--text);
  }

  .search-wrap {
    width: 100%;
    max-width: 900px;
    padding: 0 24px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(var(--bg) 85%, transparent);
    padding-top: 16px;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: #444; }

  .results-info {
    max-width: 900px;
    width: 100%;
    padding: 0 24px 16px;
    color: var(--muted);
    font-size: 13px;
  }

  .grid {
    width: 100%;
    max-width: 900px;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .grid.single-result { grid-template-columns: 1fr; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
  }

  .card:hover { border-color: #444; transform: translateY(-2px); }

  .card.spotlight {
    animation: spotlight-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    grid-column: 1 / -1;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  @keyframes spotlight-in {
    from { opacity: 0.4; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1); }
  }

  .thumb {
    aspect-ratio: 16/9;
    background: #111;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thumb-label {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #2a2a2a;
    user-select: none;
    transition: color 0.2s;
  }

  .card:hover .thumb-label { color: #333; }

  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover .play-overlay { opacity: 1; }

  .play-overlay svg { width: 48px; height: 48px; fill: white; }

  .card-body { padding: 14px 16px; }

  .card-num {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 5px; }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: #222;
    color: #999;
    border: 1px solid #2c2c2c;
  }

  .tag.person { background: #1a1a2e; color: #8888cc; border-color: #2a2a4a; }
  .tag.game   { background: #1a2a1a; color: #77aa77; border-color: #2a3a2a; }

  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .modal-bg.open { display: flex; }

  .modal {
    width: 100%;
    max-width: 960px;
    padding: 0 20px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 0 0 14px;
  }

  .modal-num { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 2px; }

  .close-btn {
    background: none;
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--muted);
    font-size: 20px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .close-btn:hover { border-color: #666; color: var(--text); }

  .player-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .player-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 12px; padding-bottom: 20px; }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    font-size: 15px;
  }
</style>
</head>
<body class="locked">

<div id="gate">
  <form id="gate-form" autocomplete="off">
    <input id="gate-input" type="password" placeholder="passwort" autocomplete="off" autofocus />
    <div class="gate-error" id="gate-error">falsch.</div>
  </form>
</div>

<header><h1>heute.</h1></header>

<div class="search-wrap">
  <input id="search" type="text" placeholder="suche nach video, person, spiel… mehrere tags mit leerzeichen trennen" autocomplete="off" />
</div>

<div class="results-info" id="results-info"></div>
<div class="grid" id="grid"></div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-num" id="modal-num"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>

    <div class="player-wrap">
      <iframe id="player-iframe"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowfullscreen>
      </iframe>
    </div>

    <div class="modal-tags" id="modal-tags"></div>
  </div>
</div>

<script>
const GATE_HASHES = new Set([
  "1b879216dc17755c07c11fd2b7e15dd8df5ef7f8c0a3f27e1c6f0ddb4d2c03b6",
  "46ddd8196f72b3e629511ce5c746aaaa82d53df3f9a3e8831d653bbb04ccf13e",
  "6e65b61d030e5ac6492802c6f619a63006e5b0e2cafc0170ab92a68083162528",
  "85d6385b945c0d602103db39b0b654b2af93b5127938e26a959c123f0789b948",
  "5ad4fca71d720f79036d7ba27b999f6a423d69b57877558d43e5d6bdd7b7a8a9",
  "75992a5ac67ff644d3063976c2effd10bdd93fcc109798e3d5c1acf2e530d01a",
  "f9c6f275600d0a3a06264cca302f245e442e2f5d7283d16eab7f555735519916",
]);

async function sha256Hex(str) {
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function tryUnlock(value) {
  if (!value) return false;
  const hash = await sha256Hex(value);
  return GATE_HASHES.has(hash);
}

function unlockSite() {
  document.body.classList.remove("locked");
  document.getElementById("gate").classList.add("hidden");
  startApp();
}

function showGateError() {
  const input = document.getElementById("gate-input");
  const err = document.getElementById("gate-error");
  err.classList.add("show");
  input.classList.remove("shake");
  void input.offsetWidth;
  input.classList.add("shake");
  input.value = "";
  setTimeout(() => input.classList.remove("shake"), 350);
}

document.getElementById("gate-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const input = document.getElementById("gate-input");
  const ok = await tryUnlock(input.value);
  if (ok) {
    unlockSite();
  } else {
    showGateError();
  }
});

document.getElementById("gate-input").addEventListener("input", () => {
  document.getElementById("gate-error").classList.remove("show");
});

document.getElementById("gate-input").focus();

const VIDEOS = [
  { id:1,  videoId:"GgY-qG66mRI", persons:["rquw","XRClon"],                                                    realNames:["Fabio","Xaver"],                             games:["Wobbly Life","Minecraft Bedwars","Roblox Rivals"] },
  { id:2,  videoId:"7BeJxzEZVz0", persons:["rquw","XRClon"],                                                    realNames:["Fabio","Xaver"],                             games:["Roblox Rivals"] },
  { id:3,  videoId:"-GqyFOPw3QU", persons:["rquw","CloudMelt","Zaykee","XRClon","Kayt"],                        realNames:["Fabio","Chrisi","Niki","Xaver","Martin"],     games:["Make It Meme","Richup","Roblox Rivals","Minecraft"] },
  { id:4,  videoId:"jJZ6pZ5v80c", persons:["rquw","CloudMelt","Zaykee","XRClon"],                               realNames:["Fabio","Chrisi","Niki","Xaver"],              games:["Piko Park"] },
  { id:5,  videoId:"iY3rKzpOrvc", persons:["rquw","CloudMelt","Zaykee"],                                        realNames:["Fabio","Chrisi","Niki"],                      games:["Minecraft Survival","Cookee","Todoroki2009"] },
  { id:6,  videoId:"fjtYULoGSzo", persons:["rquw","CloudMelt","Zaykee","Cookeey","XRClon"],                     realNames:["Fabio","Chrisi","Niki","Jaks","Xaver"],       games:["Minecraft Survival"] },
  { id:7,  videoId:"rTbi1m5G4ig", persons:["rquw","CloudMelt","Zaykee","XRClon"],                               realNames:["Fabio","Chrisi","Niki","Xaver"],              games:["Minecraft Survival"] },
  { id:8,  videoId:"QQPmDQPha2k", persons:["rquw","CloudMelt"],                                                 realNames:["Fabio","Chrisi"],                             games:["Minecraft Survival"] },
  { id:9,  videoId:"GH9lQULIt9o", persons:["rquw","CloudMelt","Zaykee","Cookeey","XRClon"],                     realNames:["Fabio","Chrisi","Niki","Jaks","Xaver"],       games:["Minecraft Survival"] },
  { id:10, videoId:"cBykPOuAwr4", persons:["rquw","CloudMelt","Zaykee","Cookeey"],                              realNames:["Fabio","Chrisi","Niki","Jaks"],               games:["Minecraft Bedwars","Minecraft Creative","Fortnite"] },
  { id:11, videoId:"VrbcR2ZBbyA", persons:["rquw","CloudMelt","Zaykee","Cookeey","XRClon","Kayt","Todoroki"],   realNames:["Fabio","Chrisi","Niki","Jaks","Xaver","Martin","Nao"], games:["Fortnite","Minecraft Bedwars","Minecraft Skywars","Among Us"] },
  { id:12, videoId:"F3VUL6C5rFY", persons:["rquw","CloudMelt","Zaykee","Todoroki"],                             realNames:["Fabio","Chrisi","Niki","Nao"],                games:["Roblox Rivals","Roblox Desert"] },
  { id:13, videoId:"Y7DTQwOMN8A", persons:["rquw","CloudMelt","Zaykee","Cookeey","Kit"],                        realNames:["Fabio","Chrisi","Niki","Jaks","Kit"],          games:["rv there yet?"] },
  { id:14, videoId:"fwY00FFB1yc", persons:["rquw","CloudMelt","Zaykee","Cookeey","XRClon"],                     realNames:["Fabio","Chrisi","Niki","Jaks","Xaver"],       games:["Rounds","Rocket League","Minecraft Survival"] },
  { id:15, videoId:"5taV9lOyoro", persons:["rquw","CloudMelt","Zaykee","Cookeey","XRClon"],                     realNames:["Fabio","Chrisi","Niki","Jaks","Xaver"],       games:["Minecraft"] },
];

let currentVideo = null;

function matchesToken(v, token) {
  const t = token.toLowerCase();
  if (!t) return true;
  const numMatch = t.match(/^(?:heute\s*)?(\d+)$/);
  if (numMatch && parseInt(numMatch[1]) === v.id) return true;
  if (t === 'heute') return true;
  for (let i = 0; i < v.persons.length; i++) {
    if (v.persons[i].toLowerCase().includes(t)) return true;
    if (v.realNames[i].toLowerCase().includes(t)) return true;
  }
  for (const g of v.games) {
    if (g.toLowerCase().includes(t)) return true;
  }
  return false;
}

function matches(v, q) {
  const tokens = q.trim().split(/\s+/).filter(Boolean);
  if (!tokens.length) return true;
  return tokens.every(tok => matchesToken(v, tok));
}

function buildTitle(v) { return v.games.join(', '); }

function renderCards(q) {
  const filtered = VIDEOS.filter(v => matches(v, q));
  const grid = document.getElementById('grid');
  const info = document.getElementById('results-info');
  grid.innerHTML = '';

  const single = filtered.length === 1;
  grid.className = 'grid' + (single ? ' single-result' : '');

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">nichts gefunden.</div>';
    info.textContent = '';
    return;
  }

  info.textContent = q.trim()
    ? (filtered.length === VIDEOS.length ? `alle ${VIDEOS.length} videos` : `${filtered.length} von ${VIDEOS.length} videos`)
    : `${VIDEOS.length} videos`;

  for (const v of filtered) {
    const card = document.createElement('div');
    card.className = 'card' + (single ? ' spotlight' : '');
    card.onclick = () => openModal(v);
    card.innerHTML = `
      <div class="thumb">
        <span class="thumb-label">heute ${v.id}</span>
        <div class="play-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-num">heute ${v.id}</div>
        <div class="card-title">${buildTitle(v)}</div>
        <div class="tags">
          ${v.persons.map((p,i) => `<span class="tag person" title="${v.realNames[i]}">${p}</span>`).join('')}
          ${v.games.map(g => `<span class="tag game">${g}</span>`).join('')}
        </div>
      </div>`;
    grid.appendChild(card);
  }
}

function openModal(v) {
  currentVideo = v;

  document.getElementById('modal-num').textContent = `HEUTE ${v.id}`;
  document.getElementById('modal-title').textContent = buildTitle(v);
  document.getElementById('modal-tags').innerHTML =
    v.persons.map((p,i) => `<span class="tag person">${p} (${v.realNames[i]})</span>`).join('') +
    v.games.map(g => `<span class="tag game">${g}</span>`).join('');

  const iframe = document.getElementById('player-iframe');
  iframe.src = `https://www.youtube-nocookie.com/embed/${v.videoId}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('player-iframe').src = '';
  currentVideo = null;
  renderCards(document.getElementById('search').value);
}

document.addEventListener('keydown', (e) => {
  const isOpen = document.getElementById('modal').classList.contains('open');
  if (e.key === 'Escape' && isOpen) { closeModal(); return; }
  if (!isOpen || document.activeElement.tagName === 'INPUT') return;
  const iframe = document.getElementById('player-iframe');
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (!window._ytPaused) {
      iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
      window._ytPaused = true;
    } else {
      iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
      window._ytPaused = false;
    }
  }
  if (e.key === 'f' || e.key === 'F') {
    const pw = document.querySelector('.player-wrap');
    if (document.fullscreenElement) document.exitFullscreen();
    else pw.requestFullscreen().catch(() => {});
  }
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.getElementById('search').addEventListener('input', (e) => renderCards(e.target.value));

let _appStarted = false;
function startApp() {
  if (_appStarted) return;
  _appStarted = true;
  renderCards('');
}
</script>
</body>
</html>
